<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prowess Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0b0d11;
    --surface: #111318;
    --raised:  #161920;
    --border:  rgba(180,160,110,0.14);
    --border2: rgba(180,160,110,0.28);
    --gold:    #b8912e;
    --gold2:   #d4aa50;
    --gold3:   #f0cc78;
    --text:    #ccc4b0;
    --text2:   #7a7060;
    --text3:   #3e3a30;
    --green:   #4a9e72;
    --green2:  #5ab882;
    --blue:    #4a7eb8;
    --blue2:   #5a90cc;
    --amber:   #b87830;
    --amber2:  #d49040;
    --red:     #9e4040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fine dot texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(180,160,110,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding-bottom: 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 32px 20px 22px;
    position: relative;
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--gold2);
    text-transform: uppercase;
  }
  .header-rule {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 24px 0;
  }
  .header-rule::before,
  .header-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .header-diamond {
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── Section ── */
  .section { padding: 20px 16px 0; }
  .section-label { display: none; }

  /* ── Toggles ── */
  .toggles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .tog {
    border: none;
    border-radius: 8px;
    padding: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-align: center;
    user-select: none;
    height: 96px;
    background-size: cover;
    background-position: center 20%;
    background-color: var(--surface);
    transition: transform 0.12s;
    box-shadow: inset 0 0 0 1px var(--border);
  }
  .tog::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.72) 100%);
    transition: opacity 0.2s;
  }
  .tog.on { box-shadow: inset 0 0 0 1px var(--gold); }
  .tog.on::after { opacity: 0.28; }
  .tog:active { transform: scale(0.96); }
  .tog-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(220,200,160,0.55);
    display: block;
    position: absolute;
    bottom: 9px;
    left: 0; right: 0;
    z-index: 1;
    text-shadow: 0 1px 6px rgba(0,0,0,1);
    transition: color 0.2s;
  }
  .tog.on .tog-name { color: var(--gold3); }

  /* ── Buff cards ── */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .stat {
    background: var(--surface);
    border: none;
    box-shadow: inset 0 0 0 1px var(--border);
    border-radius: 8px;
    padding: 16px 14px 14px;
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center 20%;
  }
  .stat-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,10,14,0.78);
    pointer-events: none;
  }
  .stat-inner {
    position: relative;
    z-index: 1;
  }
  /* colour accent left bar */
  .stat::after {
    content: '';
    position: absolute;
    top: 12px; bottom: 12px;
    left: 0;
    width: 2px;
    border-radius: 0 2px 2px 0;
    z-index: 2;
  }
  .stat.prowess-stat::after   { background: var(--green); }
  .stat.nonprowess-stat::after { background: var(--blue); }
  .stat.storm-stat::after     { background: var(--amber); }

  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 46px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    padding-left: 10px;
  }
  .stat.prowess-stat,
  .stat.nonprowess-stat {
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 16px;
  }
  .stat.prowess-stat   .stat-value { color: var(--green2); }
  .stat.nonprowess-stat .stat-value { color: var(--blue2); }
  .stat.storm-stat     .stat-value { color: var(--amber2); font-size: 40px; padding-left: 0; }

  /* storm + reset row */
  .storm-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: stretch;
  }
  .stat.storm-stat {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 14px 14px;
    min-width: 0;
  }
  .stat.storm-stat .stat-label { margin-bottom: 0; padding-left: 10px; }

  .reset-btn {
    flex-shrink: 0;
    background: rgba(184,145,46,0.07);
    border: none;
    box-shadow: inset 0 0 0 1px rgba(184,145,46,0.3);
    border-radius: 8px;
    padding: 14px 24px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    transition: color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.1s;
    user-select: none;
    white-space: nowrap;
    line-height: 1.5;
  }
  .reset-btn:active {
    box-shadow: inset 0 0 0 1px var(--red);
    color: #c06060;
    background: rgba(158,64,64,0.1);
    transform: scale(0.97);
  }

  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 10px;
  }

  @keyframes popval {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .popping { animation: popval 0.25s cubic-bezier(0.2,0.8,0.4,1); }

  /* ── Spell buttons ── */
  .spells { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .spell-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 26px 14px;
    cursor: pointer;
    text-align: left;
    position: relative;
    user-select: none;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
  }
  .spell-btn:active { transform: scale(0.96); }

  .sp-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    display: block;
  }

  /* colour left bar on spell btns */
  .spell-btn::after {
    content: '';
    position: absolute;
    top: 10px; bottom: 10px;
    left: 0;
    width: 2px;
    border-radius: 0 2px 2px 0;
    transition: opacity 0.12s;
  }

  .spell-btn.inst  { border-color: rgba(74,158,114,0.25); }
  .spell-btn.inst::after  { background: var(--green); }
  .spell-btn.inst  .sp-name  { color: var(--green2); }
  .spell-btn.inst:active  { background: rgba(74,158,114,0.07); }

  .spell-btn.copy  { border-color: rgba(130,90,180,0.25); }
  .spell-btn.copy::after  { background: #7a5ab0; }
  .spell-btn.copy  .sp-name  { color: #9a7ad0; }
  .spell-btn.copy:active  { background: rgba(130,90,180,0.07); }

  .spell-btn.other { border-color: rgba(184,120,48,0.25); }
  .spell-btn.other::after { background: var(--amber); }
  .spell-btn.other .sp-name { color: var(--amber2); }
  .spell-btn.other:active { background: rgba(184,120,48,0.07); }

  .spell-btn.creature { border-color: rgba(140,120,80,0.2); }
  .spell-btn.creature::after { background: var(--text2); }
  .spell-btn.creature .sp-name { color: var(--text2); }
  .spell-btn.creature:active { background: rgba(140,120,80,0.06); }

  /* ── Divider ── */
  .divider {
    margin: 20px 16px 0;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Prowess Tracker</h1>
    <div class="header-rule"><div class="header-diamond"></div></div>
  </div>

  <div class="section">
    <div class="section-label">Creatures in play</div>
    <div class="toggles">
      <button class="tog" id="tog-balmor" onclick="toggle('balmor')" style="background-image:url('img/balmor-battlemage-captain.jpg')">
        <span class="tog-name">Balmor</span>
      </button>
      <button class="tog" id="tog-leonin" onclick="toggle('leonin')" style="background-image:url('img/leonin-lightscribe.jpg')">
        <span class="tog-name">Leonin</span>
      </button>
      <button class="tog" id="tog-veyran" onclick="toggle('veyran')" style="background-image:url('img/veyran-voice-of-duality.jpg')">
        <span class="tog-name">Veyran</span>
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Buffs this turn</div>
    <div class="stats">
      <div class="stat prowess-stat" id="card-prowess" style="background-image:url('img/monk.jpg')">
        <div class="stat-overlay"></div>
        <div class="stat-inner">
          <div class="stat-label">With Prowess</div>
          <div class="stat-value" id="val-prowess">+0/+0</div>
        </div>
      </div>
      <div class="stat nonprowess-stat" id="card-noprowess">
        <div class="stat-overlay"></div>
        <div class="stat-inner">
          <div class="stat-label">Other Creatures</div>
          <div class="stat-value" id="val-noprowess">+0/+0</div>
        </div>
      </div>
      <div class="storm-row">
        <div class="stat storm-stat">
          <div class="stat-label">Storm Count</div>
          <div class="stat-value" id="val-storm">0</div>
        </div>
        <button class="reset-btn" onclick="resetAll()">⟳<br>Reset</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Cast a spell</div>
    <div class="spells">
      <button class="spell-btn inst"    onclick="cast('inst')">   <span class="sp-name">Instant / Sorcery</span></button>
      <button class="spell-btn copy"    onclick="cast('copy')">   <span class="sp-name">Copy</span></button>
      <button class="spell-btn other"   onclick="cast('other')">  <span class="sp-name">Other Noncreature</span></button>
      <button class="spell-btn creature" onclick="cast('creature')"><span class="sp-name">Creature Spell</span></button>
    </div>
  </div>


</div>
<script>
const S = {
  balmor: false, leonin: false, veyran: false,
  prowess_p: 0, prowess_t: 0,
  leonin_p: 0,  leonin_t: 0,
  balmor_p: 0,
  storm: 0
};

function toggle(who) {
  S[who] = !S[who];
  document.getElementById('tog-' + who).classList.toggle('on', S[who]);
}

function cast(type) {
  if (type !== 'copy') S.storm++;
  const m = S.veyran ? 2 : 1;
  if (type === 'inst') {
    S.prowess_p += m; S.prowess_t += m;
    if (S.leonin) { S.leonin_p += m; S.leonin_t += m; }
    if (S.balmor)   S.balmor_p += m;
  } else if (type === 'copy') {
    if (S.leonin) { S.leonin_p += m; S.leonin_t += m; }
  } else if (type === 'other') {
    S.prowess_p += 1; S.prowess_t += 1;
  }
  render();
  pop('card-prowess');
  pop('card-noprowess');
}

function pop(id) {
  const v = document.getElementById(id).querySelector('.stat-value');
  v.classList.remove('popping');
  void v.offsetWidth;
  v.classList.add('popping');
}

function fmt(p, t) {
  return (p >= 0 ? '+' : '') + p + '/' + (t >= 0 ? '+' : '') + t;
}

function render() {
  const prowP = S.prowess_p + S.leonin_p + S.balmor_p;
  const prowT = S.prowess_t + S.leonin_t;
  const noP   = S.leonin_p  + S.balmor_p;
  const noT   = S.leonin_t;
  document.getElementById('val-prowess').textContent   = fmt(prowP, prowT);
  document.getElementById('val-noprowess').textContent = fmt(noP, noT);
  document.getElementById('val-storm').textContent     = S.storm;
}

function resetAll() {
  Object.assign(S, { prowess_p:0, prowess_t:0, leonin_p:0, leonin_t:0, balmor_p:0, storm:0 });
  render();
}

render();
</script>
</body>
</html>
